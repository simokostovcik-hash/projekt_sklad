<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title><!DOCTYPE html>
        <html xmlns:th="http://www.thymeleaf.org">
        <head>
        <meta charset="UTF-8">
        <title>Správa pražíren</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Seznam pražíren</h2>
            <a href="/admin/prazirna/nova" class="btn btn-success btn-sm">Přidat novou pražírnu</a>
        </div>
        <div class="card-body">

            <table class="table table-hover table-striped">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Název pražírny</th>
                    <th>Země původu</th>
                    <th>Adresa / Lokalita</th>
                    <th class="text-center">Akce</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${vsechnyPrazirny}">
                    <td th:text="${p.id}">1</td>
                    <td class="fw-bold" th:text="${p.nazev}">Nordbeans</td>
                    <td th:text="${p.zemePuvodu}">Česká republika</td>
                    <td th:text="${p.adresa}">Liberec</td>
                    <td class="text-center">
                        <a th:href="@{/admin/prazirna/smazat/{id}(id=${p.id})}"
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('Opravdu smazat?')">
                            Smazat
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(vsechnyPrazirny)}">
                    <td colspan="5" class="text-center text-muted">V databázi nejsou zatím žádné pražírny.</td>
                </tr>
                </tbody>
            </table>

        </div>
        <div class="card-footer text-end">
            <a href="/kava/vse" class="btn btn-secondary">Zpět na sklad kávy</a>
        </div>
    </div>
</div>

</body>
</html></title>
</head>
<body>

</body>
</html>
