<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Seznam pražíren</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>☕ Naše partnerské pražírny</h1>
        <div>
            <a href="/admin/prazirna/nova" sec:authorize="hasRole('ADMIN')" class="btn btn-primary">➕ Přidat pražírnu</a>
            <a href="/sklad" class="btn btn-secondary ms-2">🏠 Zpět do menu</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-striped">
                <thead class="table-dark">
                <tr>
                    <th>Název</th>
                    <th>Země původu</th>
                    <th>Webová stránka</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${vsechnyPrazirny}">
                    <td th:text="${p.nazev}" class="fw-bold"></td>
                    <td th:text="${p.zeme}"></td>
                    <td>
                        <a th:href="${p.web}" th:text="${p.web}" target="_blank"></a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(vsechnyPrazirny)}" class="text-center p-3 text-muted">
                Zatím nemáme žádné pražírny v seznamu.
            </div>
        </div>
    </div>
</div>

</body>
</html>
