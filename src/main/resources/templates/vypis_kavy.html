<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sklad Kávy | Výpis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📦 Aktuální sklad kávy</h1>
        <div>
            <a href="/kava/pridat" class="btn btn-success shadow-sm">➕ Přidat novou kávu</a>
            <a href="/sklad" class="btn btn-secondary shadow-sm ms-2">🏠 Zpět do menu</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Název</th>
                    <th>Druh</th>
                    <th>Množství (g/ks)</th>
                    <th>Cena (Kč)</th>
                    <th class="text-center">Akce</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="k : ${seznamKav}">
                    <td th:text="${k.nazev}" class="fw-bold"></td>
                    <td th:text="${k.druh}"></td>
                    <td th:text="${k.mnozstvi}"></td>
                    <td th:text="${k.cena}"></td>
                    <td class="text-center">
                        <a th:href="@{/kava/smazat/{id}(id=${k.id})}"
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('Opravdu smazat?')">Smazat</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="mt-3 p-3 bg-light border rounded d-flex justify-content-between">
                <span>Počet druhů: <strong th:text="${pocet}">0</strong></span>
                <span>Celková hodnota skladu: <strong th:text="${celkem}">0</strong> Kč</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
