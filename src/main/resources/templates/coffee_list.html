<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Coffee Inventory | Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container-fluid { padding: 0 30px; }
        .d-none-filtered { display: none !important; }
        .card-header h3 { font-size: 1.15rem; }
        .table-sm-text { font-size: 0.85rem; }
        .filter-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; }
        .sort-btn { cursor: pointer; border: none; background: none; padding: 0 5px; color: #adb5bd; transition: color 0.2s; }
        .sort-btn:hover { color: #0d6efd; }
        .sort-btn.active { color: #212529; font-weight: bold; }
        th { white-space: nowrap; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid mt-5">
    <div class="row">

        <div class="col-md-3">
            <div class="card shadow border-0 mb-4" sec:authorize="hasRole('ADMIN')">
                <div class="card-header bg-primary text-white p-3">
                    <h3 class="mb-0" th:text="${coffee.id == null ? '➕ Add Coffee' : '✏️ Edit Coffee'}"></h3>
                </div>
                <div class="card-body p-3">
                    <form th:action="@{/coffee/save}" th:object="${coffee}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Name:</label>
                            <input type="text" th:field="*{name}" class="form-control form-control-sm" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Roastery:</label>
                            <select th:field="*{roastery}" class="form-select form-select-sm" required>
                                <option value="">-- Select --</option>
                                <option th:each="r : ${allRoasteries}" th:value="${r.id}" th:text="${r.name}"></option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Type:</label>
                            <input type="text" th:field="*{type}" class="form-control form-control-sm">
                        </div>
                        <div class="row g-2">
                            <div class="col-6 mb-2">
                                <label class="form-label small fw-bold">Weight (g):</label>
                                <input type="number" th:field="*{quantity}" class="form-control form-control-sm" required>
                            </div>
                            <div class="col-6 mb-2">
                                <label class="form-label small fw-bold">Price:</label>
                                <input type="number" th:field="*{price}" class="form-control form-control-sm" required>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Status:</label>
                            <select th:field="*{stockStatus}" class="form-select form-select-sm" id="statusSelect" onchange="toggleDate()">
                                <option value="In Stock">In Stock</option>
                                <option value="Out of Stock">Out of Stock</option>
                                <option value="Ordered">Ordered</option>
                            </select>
                        </div>
                        <div class="mb-3" id="dateDiv" th:style="${coffee.stockStatus == 'Ordered' ? 'display: block;' : 'display: none;'}">
                            <label class="form-label small fw-bold text-danger">Restock Date:</label>
                            <input type="date" th:field="*{orderDate}" class="form-control form-control-sm">
                        </div>
                        <button type="submit" class="btn btn-success btn-sm w-100 shadow-sm" th:text="${coffee.id == null ? 'Save Coffee' : 'Update Coffee'}"></button>
                        <a th:if="${coffee.id != null}" href="/coffee/all" class="btn btn-link btn-sm w-100 mt-1 text-decoration-none text-muted">Cancel Edit</a>
                    </form>
                </div>
            </div>

            <div class="mt-2">
                <a href="/admin/roasteries" class="btn btn-outline-primary btn-sm w-100 mb-2 shadow-sm">🏬 Manage Roasteries</a>
                <a href="/menu" class="btn btn-secondary btn-sm w-100 shadow-sm">🏠 Main Menu</a>
            </div>
        </div>

        <div th:class="${#authorization.expression('hasRole(''ADMIN'')') ? 'col-md-6' : 'col-md-6'}">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">📦 Coffee Inventory</h3>
                        <span class="badge bg-info" th:text="'Total: ' + ${total} + ' CZK'"></span>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 table-sm-text" id="mainTable">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-3">Name <span class="sort-btn" onclick="sortTable(0, 'text')">↕</span></th>
                                <th>Roastery <span class="sort-btn" onclick="sortTable(1, 'text')">↕</span></th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Qty <span class="sort-btn" onclick="sortTable(4, 'num')">↕</span></th>
                                <th>Price <span class="sort-btn" onclick="sortTable(5, 'num')">↕</span></th>
                                <th sec:authorize="hasRole('ADMIN')" class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody id="tableBody">
                            <tr th:each="c : ${coffeeList}" class="coffee-row">
                                <td th:text="${c.name}" class="fw-bold ps-3 col-name"></td>
                                <td th:text="${c.roastery != null ? c.roastery.name : '---'}" class="col-roastery"></td>
                                <td th:text="${c.type}" class="col-type text-muted"></td>
                                <td class="col-status">
                                    <span th:text="${c.stockStatus}" th:classappend="${c.stockStatus == 'In Stock' ? 'badge bg-success' : (c.stockStatus == 'Ordered' ? 'badge bg-warning text-dark' : 'badge bg-danger')}" class="badge"></span>
                                </td>
                                <td class="col-qty"><span th:text="${c.quantity}"></span>g</td>
                                <td class="col-price fw-bold text-dark"><span th:text="${c.price}"></span>,-</td>
                                <td sec:authorize="hasRole('ADMIN')" class="text-center">
                                    <div class="btn-group">
                                        <a th:href="@{/coffee/edit/{id}(id=${c.id})}" class="btn btn-sm btn-light">✏️</a>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0">
                <div class="card-header bg-secondary text-white p-3">
                    <h3 class="mb-0">🔍 Advanced Filters</h3>
                </div>
                <div class="card-body p-3">
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Coffee Name</label>
                        <input type="text" id="filterGeneral" class="form-control form-control-sm" placeholder="Search name..." onkeyup="runAllFilters()">
                    </div>
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Roastery</label>
                        <select id="filterRoastery" class="form-select form-select-sm" onchange="runAllFilters()">
                            <option value="">All Roasteries</option>
                            <option th:each="r : ${allRoasteries}" th:value="${r.name}" th:text="${r.name}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Coffee Type</label>
                        <input type="text" id="filterType" class="form-control form-control-sm" placeholder="e.g. Arabica" onkeyup="runAllFilters()">
                    </div>
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Availability Status</label>
                        <select id="filterStatus" class="form-select form-select-sm" onchange="runAllFilters()">
                            <option value="">All Statuses</option>
                            <option value="In Stock">In Stock</option>
                            <option value="Out of Stock">Out of Stock</option>
                            <option value="Ordered">Ordered</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Weight Range (g)</label>
                        <div class="d-flex gap-2">
                            <input type="number" id="filterWeightMin" class="form-control form-control-sm" placeholder="Min" onkeyup="runAllFilters()">
                            <input type="number" id="filterWeightMax" class="form-control form-control-sm" placeholder="Max" onkeyup="runAllFilters()">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Max Price (CZK)</label>
                        <input type="number" id="filterPrice" class="form-control form-control-sm" placeholder="e.g. 500" onkeyup="runAllFilters()">
                    </div>
                    <hr>
                    <button class="btn btn-sm btn-outline-danger w-100" onclick="resetFilters()">Reset All Filters</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleDate() {
        var s = document.getElementById('statusSelect');
        var d = document.getElementById('dateDiv');
        if (s && d) d.style.display = (s.value === 'Ordered') ? 'block' : 'none';
    }

    function runAllFilters() {
        const searchVal = document.getElementById('filterGeneral').value.toLowerCase();
        const roasteryVal = document.getElementById('filterRoastery').value.toLowerCase();
        const typeVal = document.getElementById('filterType').value.toLowerCase();
        const statusVal = document.getElementById('filterStatus').value;
        const priceMax = parseFloat(document.getElementById('filterPrice').value) || Infinity;
        const weightMin = parseFloat(document.getElementById('filterWeightMin').value) || 0;
        const weightMax = parseFloat(document.getElementById('filterWeightMax').value) || Infinity;

        const rows = document.querySelectorAll('.coffee-row');

        rows.forEach(row => {
            const name = row.querySelector('.col-name').textContent.toLowerCase();
            const roastery = row.querySelector('.col-roastery').textContent.toLowerCase();
            const type = row.querySelector('.col-type').textContent.toLowerCase();
            const status = row.querySelector('.col-status .badge').textContent.trim();
            const price = parseFloat(row.querySelector('.col-price span').textContent);
            const weight = parseFloat(row.querySelector('.col-qty span').textContent);

            const matchName = name.includes(searchVal);
            const matchRoastery = roasteryVal === "" || roastery === roasteryVal;
            const matchType = type.includes(typeVal);
            const matchStatus = statusVal === "" || status === statusVal;
            const matchPrice = price <= priceMax;
            const matchWeight = weight >= weightMin && weight <= weightMax;

            row.classList.toggle('d-none-filtered', !(matchName && matchRoastery && matchType && matchStatus && matchPrice && matchWeight));
        });
    }

    function resetFilters() {
        ['filterGeneral', 'filterType', 'filterPrice', 'filterWeightMin', 'filterWeightMax'].forEach(id => document.getElementById(id).value = '');
        ['filterRoastery', 'filterStatus'].forEach(id => document.getElementById(id).value = '');
        runAllFilters();
    }

    let sortOrder = 1;
    let lastColumn = -1;

    function sortTable(columnIndex, type) {
        const tableBody = document.getElementById('tableBody');
        const rows = Array.from(tableBody.querySelectorAll('.coffee-row'));

        if (lastColumn === columnIndex) {
            sortOrder *= -1;
        } else {
            sortOrder = 1;
            lastColumn = columnIndex;
        }

        rows.sort((a, b) => {
            let valA = a.cells[columnIndex].textContent.trim();
            let valB = b.cells[columnIndex].textContent.trim();

            if (type === 'num') {
                valA = parseFloat(valA.replace(/[^-0-9.]/g, '')) || 0;
                valB = parseFloat(valB.replace(/[^-0-9.]/g, '')) || 0;
            } else {
                valA = valA.toLowerCase();
                valB = valB.toLowerCase();
            }

            if (valA < valB) return -1 * sortOrder;
            if (valA > valB) return 1 * sortOrder;
            return 0;
        });

        rows.forEach(row => tableBody.appendChild(row));

        document.querySelectorAll('.sort-btn').forEach((btn) => {
            btn.innerHTML = '↕';
            btn.classList.remove('active');
        });

        const allButtons = document.querySelectorAll('.sort-btn');
        let activeBtn;
        if(columnIndex === 0) activeBtn = allButtons[0];
        else if(columnIndex === 1) activeBtn = allButtons[1];
        else if(columnIndex === 4) activeBtn = allButtons[2];
        else if(columnIndex === 5) activeBtn = allButtons[3];

        if (activeBtn) {
            activeBtn.innerHTML = sortOrder === 1 ? '↑' : '↓';
            activeBtn.classList.add('active');
        }
    }

    window.onload = toggleDate;
</script>
</body>
</html>
