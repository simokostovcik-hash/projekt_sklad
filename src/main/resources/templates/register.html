<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Registration | Coffee Storage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4 card shadow p-4 border-0">
      <h2 class="text-center mb-4 fw-bold">New Registration</h2>

      <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

      <form th:action="@{/register}" method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" id="passwordField" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="showPasswordCheck" onclick="togglePassword()">
          <label class="form-check-label small text-muted" for="showPasswordCheck">Show password</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Create Account</button>
      </form>

      <div class="mt-4 text-center border-top pt-3">
        <span class="text-muted small">Already have an account?</span>
        <a href="/login" class="small text-primary text-decoration-none fw-bold">Sign In</a>
      </div>
    </div>
  </div>
</div>

<script>
  function togglePassword() {
    var passInput = document.getElementById("passwordField");
    if (passInput.type === "password") {
      passInput.type = "text";
    } else {
      passInput.type = "password";
    }
  }
</script>

</body>
</html>
