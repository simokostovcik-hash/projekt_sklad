<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Registrace uživatele</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4 card shadow p-4 border-0">
      <h2 class="text-center mb-4 fw-bold">Nová registrace</h2>
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <form th:action="@{/register}" method="post">
        <div class="mb-3">
          <label class="form-label">Uživatelské jméno</label>
          <input type="text" name="username" class="form-control" placeholder="Zadejte jméno" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Heslo</label>
          <input type="password" name="password" class="form-control" placeholder="Zadejte heslo" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Vytvořit účet</button>
      </form>

      <div class="mt-4 text-center border-top pt-3">
        <span class="text-muted small">Již máte účet?</span>
        <a href="/login" class="small text-primary text-decoration-none fw-bold">Přihlaste se</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
