<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | System Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>System Administration</h1>
    <a href="/menu" class="btn btn-outline-secondary">Back to Menu</a>
  </div>

  <div class="card shadow-sm mb-5">
    <div class="card-header bg-primary text-white"><h5>User Management</h5></div>
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
        <tr>
          <th>Username</th>
          <th>Role</th>
          <th>Change Role</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
          <td th:text="${u.username}"></td>
          <td><span class="badge bg-info text-dark" th:text="${u.role}"></span></td>
          <td>
            <form th:action="@{/admin/change-role}" method="post" th:if="${u.username != 'admin'}">
              <input type="hidden" name="id" th:value="${u.id}"/>
              <select name="newRole" class="form-select form-select-sm d-inline w-auto">
                <option value="ROLE_USER" th:selected="${u.role == 'ROLE_USER'}">USER</option>
                <option value="ROLE_ADMIN" th:selected="${u.role == 'ROLE_ADMIN'}">ADMIN</option>
              </select>
              <button type="submit" class="btn btn-sm btn-primary">OK</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white"><h5>Action History (Audit Log)</h5></div>
    <div class="card-body p-0">
      <div class="table-responsive" style="max-height: 400px;">
        <table class="table table-sm table-striped mb-0">
          <thead class="sticky-top bg-white">
          <tr>
            <th>Time</th>
            <th>User</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="log : ${auditLogs}">
            <td th:text="${log.timestamp != null ? log.timestamp : '---'}"></td>
            <td th:text="${log.user}"></td>
            <td th:text="${log.action}"></td>
          </tr>
          <tr th:if="${#lists.isEmpty(auditLogs)}">
            <td colspan="3" class="text-center py-3 text-muted">No records in history yet.</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
