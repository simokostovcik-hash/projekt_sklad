<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Roasteries List | Coffee Storage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>☕ Our Partner Roasteries</h1>
        <div>
            <a href="/admin/roastery/new" sec:authorize="hasRole('ADMIN')" class="btn btn-primary shadow-sm">➕ Add Roastery</a>
            <a href="/coffee/all" class="btn btn-secondary shadow-sm ms-2">🏠 Back to Inventory</a>
        </div>
    </div>

    <div class="card shadow border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-3">Name</th>
                    <th>Country of Origin</th>
                    <th>Address</th>
                    <th>Website</th>
                    <th sec:authorize="hasRole('ADMIN')" class="text-center pe-3">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${allRoasteries}">
                    <td th:text="${r.name}" class="fw-bold ps-3"></td>
                    <td th:text="${r.country}"></td>
                    <td th:text="${r.address != null ? r.address : '---'}"></td>
                    <td>
                        <a th:if="${r.website != null and !r.website.empty}"
                           th:href="${r.website}" th:text="${r.website}" target="_blank" class="text-decoration-none"></a>
                        <span th:unless="${r.website != null and !r.website.empty}" class="text-muted small">not specified</span>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')" class="text-center pe-3">
                        <div class="btn-group">
                            <a th:href="@{/admin/roastery/edit/{id}(id=${r.id})}"
                               class="btn btn-sm btn-outline-warning">✏️</a>
                            <a th:href="@{/admin/roastery/delete/{id}(id=${r.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Really delete this roastery?')">🗑️</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(allRoasteries)}" class="text-center p-5 text-muted">
                <p class="mb-0">No roasteries in the list yet.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
