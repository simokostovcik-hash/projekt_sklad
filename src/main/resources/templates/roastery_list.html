<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Roasteries Management | Coffee Storage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container-fluid { padding: 0 30px; }
        .d-none-filtered { display: none !important; }
        .card-header h3 { font-size: 1.15rem; }
        .table-sm-text { font-size: 0.85rem; }
        .filter-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; }
        .sort-btn { cursor: pointer; border: none; background: none; padding: 0 5px; color: #adb5bd; transition: color 0.2s; }
        .sort-btn:hover { color: #0d6efd; }
        .sort-btn.active { color: #212529; font-weight: bold; }
        th { white-space: nowrap; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid mt-5">
    <div class="row">

        <div class="col-md-3">
            <div class="card shadow border-0 mb-4" sec:authorize="hasRole('ADMIN')">
                <div class="card-header bg-primary text-white p-3">
                    <h3 class="mb-0" th:text="${roastery.id == null ? '➕ Add Roastery' : '✏️ Edit Roastery'}"></h3>
                </div>
                <div class="card-body p-3">
                    <form th:action="@{/admin/roastery/save}" th:object="${roastery}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Roastery Name:</label>
                            <input type="text" th:field="*{name}" class="form-control form-control-sm" placeholder="e.g. Doubleshot" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Country:</label>
                            <input type="text" th:field="*{country}" class="form-control form-control-sm" placeholder="e.g. Czech Republic" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small fw-bold">Address:</label>
                            <input type="text" th:field="*{address}" class="form-control form-control-sm" placeholder="e.g. Prague">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Website:</label>
                            <input type="url" th:field="*{website}" class="form-control form-control-sm" placeholder="https://...">
                        </div>
                        <button type="submit"
                                th:class="${roastery.id == null ? 'btn btn-success btn-sm w-100 shadow-sm' : 'btn btn-warning btn-sm w-100 shadow-sm'}"
                                th:text="${roastery.id == null ? 'Save Roastery' : 'Update Roastery'}"></button>
                        <a th:if="${roastery.id != null}" href="/admin/roasteries" class="btn btn-link btn-sm w-100 mt-1 text-decoration-none text-muted">Cancel Edit</a>
                    </form>
                </div>
            </div>

            <div class="mt-3">
                <a href="/coffee/all" class="btn btn-outline-primary btn-sm w-100 mb-2 shadow-sm">📦 Manage Inventory</a>
                <a href="/menu" class="btn btn-secondary btn-sm w-100 shadow-sm">🏠 Main Menu</a>
            </div>
        </div>

        <div th:class="${#authorization.expression('hasRole(''ADMIN'')') ? 'col-md-6' : 'col-md-6'}">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white p-3">
                    <h3 class="mb-0">🏬 Our Partner Roasteries</h3>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 table-sm-text" id="roasteryTable">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-3">Name <span class="sort-btn" onclick="sortRoasteries(0)">↕</span></th>
                                <th>Country <span class="sort-btn" onclick="sortRoasteries(1)">↕</span></th>
                                <th>Address <span class="sort-btn" onclick="sortRoasteries(2)">↕</span></th>
                                <th>Link</th>
                                <th sec:authorize="hasRole('ADMIN')" class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody id="roasteryTableBody">
                            <tr th:each="r : ${allRoasteries}" class="roastery-row">
                                <td th:text="${r.name}" class="fw-bold ps-3 col-name"></td>
                                <td th:text="${r.country}" class="col-country"></td>
                                <td th:text="${r.address != null ? r.address : '---'}" class="col-address text-muted"></td>
                                <td class="col-website">
                                    <a th:if="${r.website != null and !r.website.empty}" th:href="${r.website}" target="_blank" class="text-primary fw-bold text-decoration-none">🌐</a>
                                    <span th:unless="${r.website != null and !r.website.empty}" class="text-muted">---</span>
                                </td>
                                <td sec:authorize="hasRole('ADMIN')" class="text-center">
                                    <div class="btn-group">
                                        <a th:href="@{/admin/roastery/edit/{id}(id=${r.id})}" class="btn btn-sm btn-light">✏️</a>
                                        <a th:href="@{/admin/roastery/delete/{id}(id=${r.id})}" class="btn btn-sm btn-light text-danger" onclick="return confirm('Delete this roastery?')">🗑️</a>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0">
                <div class="card-header bg-secondary text-white p-3">
                    <h3 class="mb-0">🔍 Filters</h3>
                </div>
                <div class="card-body p-3">
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Roastery Name</label>
                        <input type="text" id="filterName" class="form-control form-control-sm" placeholder="Search name..." onkeyup="runRoasteryFilters()">
                    </div>
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Country</label>
                        <input type="text" id="filterCountry" class="form-control form-control-sm" placeholder="e.g. Czechia" onkeyup="runRoasteryFilters()">
                    </div>
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Address / City</label>
                        <input type="text" id="filterAddress" class="form-control form-control-sm" placeholder="Search location..." onkeyup="runRoasteryFilters()">
                    </div>
                    <div class="mb-3">
                        <label class="filter-label d-block mb-1">Has Website?</label>
                        <select id="filterHasWeb" class="form-select form-select-sm" onchange="runRoasteryFilters()">
                            <option value="all">Show All</option>
                            <option value="yes">Yes (with Link)</option>
                            <option value="no">No (without Link)</option>
                        </select>
                    </div>
                    <hr>
                    <button class="btn btn-sm btn-outline-danger w-100" onclick="resetRoasteryFilters()">Reset All Filters</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function runRoasteryFilters() {
        const nameVal = document.getElementById('filterName').value.toLowerCase();
        const countryVal = document.getElementById('filterCountry').value.toLowerCase();
        const addressVal = document.getElementById('filterAddress').value.toLowerCase();
        const webVal = document.getElementById('filterHasWeb').value;

        const rows = document.querySelectorAll('.roastery-row');

        rows.forEach(row => {
            const name = row.querySelector('.col-name').textContent.toLowerCase();
            const country = row.querySelector('.col-country').textContent.toLowerCase();
            const address = row.querySelector('.col-address').textContent.toLowerCase();
            const hasWeb = row.querySelector('.col-website a') !== null;

            const matchName = name.includes(nameVal);
            const matchCountry = country.includes(countryVal);
            const matchAddress = address.includes(addressVal);

            let matchWeb = true;
            if (webVal === 'yes') matchWeb = hasWeb;
            if (webVal === 'no') matchWeb = !hasWeb;

            row.classList.toggle('d-none-filtered', !(matchName && matchCountry && matchAddress && matchWeb));
        });
    }

    function resetRoasteryFilters() {
        document.getElementById('filterName').value = '';
        document.getElementById('filterCountry').value = '';
        document.getElementById('filterAddress').value = '';
        document.getElementById('filterHasWeb').value = 'all';
        runRoasteryFilters();
    }

    let sortOrder = 1;
    let lastColumn = -1;

    function sortRoasteries(columnIndex) {
        const tableBody = document.getElementById('roasteryTableBody');
        const rows = Array.from(tableBody.querySelectorAll('.roastery-row'));

        if (lastColumn === columnIndex) {
            sortOrder *= -1;
        } else {
            sortOrder = 1;
            lastColumn = columnIndex;
        }

        rows.sort((a, b) => {
            let valA = a.cells[columnIndex].textContent.trim().toLowerCase();
            let valB = b.cells[columnIndex].textContent.trim().toLowerCase();
            if (valA < valB) return -1 * sortOrder;
            if (valA > valB) return 1 * sortOrder;
            return 0;
        });

        rows.forEach(row => tableBody.appendChild(row));

        document.querySelectorAll('.sort-btn').forEach((btn, idx) => {
            btn.innerHTML = '↕';
            btn.classList.remove('active');
            if (idx === columnIndex) {
                btn.innerHTML = sortOrder === 1 ? '↑' : '↓';
                btn.classList.add('active');
            }
        });
    }
</script>

</body>
</html>
