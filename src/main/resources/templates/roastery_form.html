<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Roastery | Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white text-center p-3">
                    <h2 class="mb-0">☕ Add New Roastery</h2>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/admin/roastery/save}" th:object="${roastery}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Roastery Name:</label>
                            <input type="text" th:field="*{name}" class="form-control"
                                   placeholder="e.g. Doubleshot" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Country of Origin:</label>
                            <input type="text" th:field="*{country}" class="form-control"
                                   placeholder="e.g. Czech Republic" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Address / Location:</label>
                            <input type="text" th:field="*{address}" class="form-control"
                                   placeholder="e.g. Prague, Kodaňská 25">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Website:</label>
                            <input type="url" th:field="*{website}" class="form-control"
                                   placeholder="https://www.roastery.com">
                            <div class="form-text text-muted">Enter URL including http:// or https://</div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-between mt-4">
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">Save Roastery</button>
                            <a href="/admin/roasteries" class="btn btn-outline-secondary px-4">Back to List</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
