<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Sklad Kávy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand">☕ Kávový Sklad</span>
        <div class="d-flex align-items-center">

            <a sec:authorize="hasRole('ADMIN')" href="/admin/uzivatele" class="btn btn-outline-warning me-3">
                <i class="bi bi-people"></i> Správa uživatelů
            </a>

            <span class="text-light me-3 small">
                Přihlášen: <strong sec:authentication="name">Uživatel</strong>
                (<span sec:authentication="principal.authorities">Role</span>)
            </span>

            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-danger btn-sm">Odhlásit</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row mb-4 text-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-primary">
                <div class="card-body">
                    <h5 class="text-muted">Druhy kávy</h5>
                    <h2 th:text="${pocet}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm border-success">
                <div class="card-body">
                    <h5 class="text-muted">Celková hodnota skladu</h5>
                    <h2 th:text="${celkem + ' Kč'}">0 Kč</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Seznam zásob</h3>

        <a sec:authorize="hasRole('ADMIN')" href="/kava/pridat" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Přidat novou kávu
        </a>
    </div>

    <div class="card shadow">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">Název kávy</th>
                    <th>Gramáž (g)</th>
                    <th>Cena (Kč)</th>

                    <th sec:authorize="hasRole('ADMIN')" class="text-center">Akce</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(seznamKav)}">
                    <td colspan="4" class="text-center py-4 text-muted">Sklad je momentálně prázdný.</td>
                </tr>
                <tr th:each="k : ${seznamKav}">
                    <td class="ps-4 fw-bold" th:text="${k.nazev}">Název</td>
                    <td th:text="${k.gramaz}">0</td>
                    <td th:text="${k.cena}">0</td>

                    <td sec:authorize="hasRole('ADMIN')" class="text-center">
                        <a th:href="@{/kava/smazat/{id}(id=${k.id})}"
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('Opravdu smazat tuto kávu?')">
                            <i class="bi bi-trash"></i> Smazat
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
