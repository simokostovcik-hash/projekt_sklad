<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Coffee Inventory | Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row">
        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <div class="card shadow border-primary mb-4">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">➕ Add Coffee</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/coffee/save}" th:object="${coffee}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Name:</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Roastery:</label>
                            <select th:field="*{roastery}" class="form-select" required>
                                <option value="">-- Select --</option>
                                <option th:each="r : ${allRoasteries}" th:value="${r.id}" th:text="${r.name}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Type:</label>
                            <input type="text" th:field="*{type}" class="form-control" placeholder="Arabica / Robusta">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">Weight (g):</label>
                                <input type="number" th:field="*{quantity}" class="form-control" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">Price:</label>
                                <input type="number" th:field="*{price}" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Status:</label>
                            <select th:field="*{stockStatus}" class="form-select" id="statusSelect" onchange="toggleDate()">
                                <option value="In Stock">In Stock</option>
                                <option value="Out of Stock">Out of Stock</option>
                                <option value="Ordered">Ordered</option>
                            </select>
                        </div>
                        <div class="mb-3" id="dateDiv" style="display: none;">
                            <label class="form-label fw-bold text-danger">Expected Restock Date:</label>
                            <input type="date" th:field="*{orderDate}" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Save</button>
                    </form>
                </div>
            </div>
            <a href="/admin/roasteries" class="btn btn-outline-primary w-100 mb-2">🏬 Manage Roasteries</a>
            <a href="/menu" class="btn btn-secondary w-100">🏠 Menu</a>
        </div>

        <div th:class="${#authorization.expression('hasRole(''ADMIN'')') ? 'col-md-8' : 'col-md-12'}">
            <div class="card shadow">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h3 class="mb-0">📦 Inventory</h3>
                    <span class="badge bg-info p-2" th:text="'Total: ' + ${total} + ' CZK'"></span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Roastery</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th sec:authorize="hasRole('ADMIN')" class="text-center">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="c : ${coffeeList}">
                                <td th:text="${c.name}" class="fw-bold"></td>
                                <td th:text="${c.roastery != null ? c.roastery.name : '---'}"></td>
                                <td th:text="${c.type}"></td>
                                <td>
                                    <span th:text="${c.stockStatus}"
                                          th:classappend="${c.stockStatus == 'In Stock' ? 'badge bg-success' : (c.stockStatus == 'Ordered' ? 'badge bg-warning text-dark' : 'badge bg-danger')}"
                                          class="badge"></span>
                                    <div th:if="${c.stockStatus == 'Ordered'}" class="small text-muted" th:text="${c.orderDate}"></div>
                                </td>
                                <td th:text="${c.quantity} + ' g'"></td>
                                <td th:text="${c.price} + ' CZK'"></td>
                                <td sec:authorize="hasRole('ADMIN')" class="text-center">
                                    <a th:href="@{/coffee/delete/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete?')">🗑️</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(coffeeList)}">
                                <td colspan="7" class="text-center p-4 text-muted">Inventory is empty.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleDate() {
        var s = document.getElementById('statusSelect');
        var d = document.getElementById('dateDiv');
        if (s.value === 'Ordered') {
            d.style.display = 'block';
        } else {
            d.style.display = 'none';
        }
    }
    window.onload = toggleDate;
</script>
</body>
</html>
