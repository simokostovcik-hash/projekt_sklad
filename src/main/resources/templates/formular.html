<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detail položky</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
<div class="row justify-content-center">
    <div class="col-md-6 border p-4 shadow-sm bg-light rounded">
        <h2 class="mb-4 text-center">Detail kávy</h2>

        <form th:action="@{/kava/ulozit}" th:object="${kava}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Vyberte druh kávy</label>
                <select th:field="*{nazev}" class="form-select" required>
                    <option value="" disabled selected>-- Vyberte z nabídky --</option>
                    <option th:each="typ : ${typyKav}"
                            th:value="${typ}"
                            th:text="${typ}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Gramáž (g)</label>
                <input type="number" th:field="*{gramaz}" class="form-control" required min="1">
            </div>

            <div class="mb-3">
                <label class="form-label">Cena (Kč)</label>
                <input type="number" th:field="*{cena}" class="form-control" required min="1">
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">💾 Uložit do systému</button>
                <a href="/kava/vse" class="btn btn-light border">Zrušit</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
