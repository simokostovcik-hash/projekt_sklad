<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Přidat kávu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow" style="max-width: 500px; margin: auto;">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Nová káva do skladu</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/kava/ulozit}" th:object="${kava}" method="post">
                <div class="mb-3">
                    <label class="form-label">Název kávy</label>
                    <input type="text" th:field="*{nazev}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Gramáž (g)</label>
                    <input type="number" th:field="*{gramaz}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Cena (Kč)</label>
                    <input type="number" th:field="*{cena}" class="form-control" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/kava/vse" class="btn btn-secondary">Zpět</a>
                    <button type="submit" class="btn btn-success">Uložit kávu</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
