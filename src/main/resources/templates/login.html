<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | Coffee Storage</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body p-4">
          <h2 class="text-center mb-4">Login</h2>

          <div th:if="${param.error}" class="alert alert-danger small py-2">
            Invalid username or password.
          </div>

          <div th:if="${param.logout}" class="alert alert-info small py-2">
            You have been logged out.
          </div>

          <div th:if="${param.success}" class="alert alert-success small py-2">
            Registration successful! Please log in.
          </div>

          <form th:action="@{/login}" method="post">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="passwordField" name="password" class="form-control" required>
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="showPasswordCheck" onclick="togglePassword()">
              <label class="form-check-label small text-muted" for="showPasswordCheck">Show password</label>
            </div>

            <div class="d-grid shadow-sm">
              <button type="submit" class="btn btn-primary">Sign In</button>
            </div>
          </form>

          <hr class="my-4">

          <div class="text-center">
            <p class="mb-2 small text-muted">Don't have an account yet?</p>
            <a href="/register" class="btn btn-outline-secondary btn-sm w-100">Create new account</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function togglePassword() {
    var passInput = document.getElementById("passwordField");
    if (passInput.type === "password") {
      passInput.type = "text";
    } else {
      passInput.type = "password";
    }
  }
</script>

</body>
</html>
