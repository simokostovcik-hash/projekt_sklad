<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nová pražírna | Správa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white text-center p-3">
                    <h2 class="mb-0">☕ Přidat novou pražírnu</h2>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/admin/prazirna/ulozit}" th:object="${prazirna}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Název pražírny:</label>
                            <input type="text" th:field="*{nazev}" class="form-control"
                                   placeholder="Např. Doubleshot" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Země původu:</label>
                            <input type="text" th:field="*{zeme}" class="form-control"
                                   placeholder="Např. Česko" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Adresa / Lokalita:</label>
                            <input type="text" th:field="*{adresa}" class="form-control"
                                   placeholder="Např. Praha, Kodaňská 25">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Webová stránka:</label>
                            <input type="url" th:field="*{web}" class="form-control"
                                   placeholder="https://www.prazirna.cz">
                            <div class="form-text text-muted">Zadejte URL včetně http:// nebo https://</div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-between mt-4">
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">Uložit pražírnu</button>
                            <a href="/admin/prazirny" class="btn btn-outline-secondary px-4">Zpět na seznam</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
